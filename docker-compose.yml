services:
  postgres:
    image: postgres:16-alpine
    container_name: mendez-barbershop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chico007321}
      POSTGRES_DB: ${DB_NAME:-mendez-barbershop}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - mendez_barbershop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-mendez-barbershop}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mendez_barbershop_pgdata:
